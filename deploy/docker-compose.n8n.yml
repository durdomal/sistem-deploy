# n8n — workflow-исполнитель для Sistem (Sprint 2).
#
# Запуск отдельно чтобы не смешивать с основным стеком:
#   docker compose -f docker-compose.yml -f docker-compose.n8n.yml --env-file .env up -d n8n
#
# После старта:
#   1. Открыть https://n8n.globria.biz (настроить nginx-конфиг — см. nginx-n8n.conf)
#      или без домена: http://127.0.0.1:5678
#   2. Пройти setup (owner email)
#   3. Импортировать workflows из ../n8n-workflows/*.json (UI → Import)
#   4. Зарегистрировать webhook_url в Sistem: POST /users/{uid}/... (Sprint 2 API — TBD, пока через SQL)

services:
  n8n:
    image: n8nio/n8n:1.71.3
    container_name: sistem-n8n
    restart: unless-stopped
    environment:
      N8N_HOST: ${N8N_HOST:-n8n.globria.biz}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://${N8N_HOST:-n8n.globria.biz}/
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-taras}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      GENERIC_TIMEZONE: Europe/Madrid
      TZ: Europe/Madrid
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: db
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/n8n:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678"
    depends_on:
      db: { condition: service_healthy }
