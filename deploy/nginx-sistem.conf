# /etc/nginx/sites-available/sistem.conf
# Symlink → /etc/nginx/sites-enabled/sistem.conf
#
# ВАЖНО: SSL получаем через `certbot certonly --webroot -w /var/www/letsencrypt
#         -d sistem.globria.biz`  (НЕ через --nginx!)
# После получения — руками добавляем ssl_certificate/ssl_certificate_key.

# HTTP → HTTPS + ACME challenge
server {
    listen 80;
    listen [::]:80;
    server_name sistem.globria.biz;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sistem.globria.biz;

    ssl_certificate     /etc/letsencrypt/live/sistem.globria.biz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sistem.globria.biz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Body limit — обеспечит защиту, но пропустит паки/загрузки
    client_max_body_size 25M;

    # Proxy → Sistem Core (localhost:8010)
    location / {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
    }

    # health/status без rate-limit чтобы Uptime Kuma не блокировался
    location = /health {
        proxy_pass http://127.0.0.1:8010/health;
        access_log off;
    }
}
