project:
  id: watersports-cb
  name: Watersports Costa Blanca
  niche: sup-rental
  status: active
  owner: taras
  tags: [sup, dénia, jávea, seasonal, b2c]

brand_pack:
  name: Watersports Costa Blanca
  palette: ["#0A6AA1", "#FFC857", "#111111"]
  fonts: [Inter, "Playfair Display"]
  voice: friendly-locals
  logo_url: https://cdn.watersports-costablanca.es/logo.svg

catalog:
  products:
    - sku: SUP-STD-1H
      name: SUP standard, 1 час
      price: 15
      currency: EUR
      description: Стандартная надувная доска, весло, лиш, жилет. Инструктаж 5 мин.
