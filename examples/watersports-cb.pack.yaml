      name: SUP premium, весь день
      price: 45
      currency: EUR
      description: Премиум доска (жёсткая), сумка, дневная аренда.

audience:
  segments:
    - name: Families with kids
      demographic: 30-50 y.o., пара + 1-2 ребёнка
      geo: Dénia, Jávea, Moraira, Calpe
      insights: Ищут спокойную активность на выходные, бронируют утром через инсту
    - name: Digital nomads
      demographic: 25-40 y.o., соло/пара
      geo: Costa Blanca, короткое пребывание
      insights: Приезжают на неделю-две, ищут «попробовать» — берут на 1-2 часа

usps:
  - Первый в Дении прокат с русскоязычным сервисом
  - Точка выдачи прямо на пляже Marineta Cassiana
  - Бесплатная фотосессия на воде с брендированным контентом

channels:
  instagram:
    handle: watersports.costablanca
    followers: 0
  facebook:
    page_id: "0"
