competitors:
  - name: SUP School Denia
    url: https://supschooldenia.com
    strengths: [давно на рынке, известная школа]
    weaknesses: [ориентация только на уроки, дорого, нет проката на час]
  - name: Dénia Watersports
    url: https://deniawatersports.com
    strengths: [большой парк техники]
    weaknesses: [нет русского языка, слабый инсту]

